# shelterflex-web  ->  .github/workflows/publish-image.yml
#
# Publishes the production container image to GHCR on merge to main.
#
# This workflow concerns only this repository: it builds and pushes, and stops
# there. It does not reach into other repositories or trigger anything in them.
# Whatever consumes the published image pulls it on its own schedule.
#
# Does not run on pull requests, so contributors are never waiting on an image
# build to review or merge.

name: Publish image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Baked into the client bundle at build time. This default targets the
          # platform compose stack; see Dockerfile and shelterflex-web#3.
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
