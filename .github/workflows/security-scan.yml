# shelterflex-web  ->  .github/workflows/security-scan.yml
# Thin caller: delegates to the reusable workflow hosted in shelterflex-platform.
#
# Pinned to the `v1` tag, not `@main`. Tracking another repository's default
# branch meant a change there could turn this repo's PRs red with no change
# here. Upgrades are now deliberate: bump the tag below when you want them.
name: Security Scan

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  scan:
    uses: Shelterflex/shelterflex-platform/.github/workflows/security-scan-reusable.yml@v1
    with:
      node-version: "22"
      setup-rust: false
